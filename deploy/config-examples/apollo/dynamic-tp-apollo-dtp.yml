# ============================================================
# Apollo / 动态线程池示例配置
# 说明：
# 1. 该文件建议作为外部配置中心样例保留，不建议继续放在应用 classpath 根路径。
# 2. 不同应用可共享告警平台配置，但线程池名称和容量应按应用职责分别规划。
# ============================================================

spring:
  dynamic:
    tp:
      enabled: true
      # 是否打印动态线程池 Banner，开发环境开启方便确认配置生效。
      enabledBanner: true
      # 是否采集线程池监控指标，生产环境建议开启并接入监控系统。
      enabledCollect: true
      # 监控数据采集器类型，保持旧工程 micrometer 方案。
      collectorType: micrometer
      # 线程池状态检测和告警扫描间隔，单位秒。
      monitorInterval: 5
      apollo:
        namespace: dynamic-tp-apollo-dtp.yml
      configType: yml
      platforms:
        - platform: wechat
          urlKey: 38aa7eff500-1287
          receivers: apollo
        - platform: ding
          urlKey: f80dad441fcd65bac48473d4a88dcd6a
          secret: SECb544445a6a34f0315d08b17de41
          receivers: 18888888888
      executors:
        - threadPoolName: mhd.im.notice
          # Public/Admin API 可复用的通知线程池。
          corePoolSize: 6
          maximumPoolSize: 8
          queueCapacity: 200
          queueType: VariableLinkedBlockingQueue
          rejectedHandlerType: CallerRunsPolicy
          keepAliveTime: 50
          allowCoreThreadTimeOut: false
          threadNamePrefix: mhd-
        - threadPoolName: execute-xxl-thread-pool
          # Job / Worker 侧执行线程池，用于 XXL-Job 或补偿任务异步执行。
          corePoolSize: 3
          maximumPoolSize: 3
          queueCapacity: 200
          queueType: VariableLinkedBlockingQueue
          rejectedHandlerType: CallerRunsPolicy
          keepAliveTime: 50
          allowCoreThreadTimeOut: false
          threadNamePrefix: austin-
          notifyItems:
            - type: capacity
              enabled: true
              threshold: 80
              platforms: [ding, wechat]
              interval: 120
            - type: change
              enabled: true
            - type: liveness
              enabled: true
              threshold: 80
            - type: reject
              enabled: true
              threshold: 1
