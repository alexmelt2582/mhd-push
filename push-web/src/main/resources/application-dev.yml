spring:
  datasource:
    name: test
    # MySQL连接配置
    url: jdbc:mysql://127.0.0.1:3306/mhd_push?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: Z4,d.3[j
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10 # 初始连接数，建议设置为与最小空闲连接数相同
      min-idle: 10 # 最小空闲连接数，保持足够的空闲连接以应对请求
      max-active: 200 # 最大连接数，根据并发需求适当增加
      max-wait: 60000 # 获取连接超时时间（毫秒），调整以满足响应时间要求
      time-between-eviction-runs-millis: 60000 # 连接有效性检测间隔时间（毫秒），定期检查连接的健康状态
      min-evictable-idle-time-millis: 300000 # 连接在池中最小生存时间（毫秒），确保连接在池中至少存在一段时间
      test-while-idle: true # 指明连接是否被空闲连接回收器(如果有)进行检验.如果检测失败,则连接将被从池中去除
      test-on-borrow: true # 指明是否在从池中取出连接前进行检验,如果检验失败, 则从池中去除连接并尝试取出另一个
      test-on-return: false # 是否在归还到池中前进行检验
      validation-query: SELECT 1 # 检测连接是否有效
      poolPreparedStatements: true
      maxOpenPreparedStatements: 20
  # 对应 RedisProperties 类
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ym6SLrprcE5VEd9cdU32Dw== # Redis 服务器密码，默认为空。
      database: 15 # Redis 数据库号，默认为 0 。
      timeout: 3000 # Redis 连接超时时间，单位：毫秒。
      # 对应 RedisProperties.lettuce 内部类
      lettuce:
        pool:
          max-active: 8 # 连接池最大连接数，默认为 8 。使用负数表示没有限制。
          max-idle: 8 # 默认连接数最小空闲的连接数，默认为 8 。使用负数表示没有限制。
          min-idle: 2 # 默认连接池最小空闲的连接数，默认为 0 。允许设置 0 和 正数。
          max-wait: 3000 # 连接池最大阻塞等待时间，单位：毫秒。默认为 -1 ，表示不限制。

dynamictp:
    enabled: true
    enabledBanner: true           # 是否开启banner打印，默认true
    enabledCollect: true          # 是否开启监控指标采集，默认true
#    logPath: /home/logs/dynamictp/user-center/  # 监控日志数据路径，默认 ${user.home}/logs，采集类型非logging不用配置
    collector-types: micrometer   # 监控数据采集器类型（logging | micrometer | internal_logging | JMX），默认micrometer
    monitorInterval: 5            # 监控时间间隔（报警检测、指标采集），默认5s

    configType: yml
    platforms:
      - platform: wechat
        urlKey: 38aa7eff500-1287
        receivers: apollo
      - platform: ding
        urlKey: f80dad441fcd65bac48473d4a88dcd6a
        secret: SECb544445a6a34f0315d08b17de41
        receivers: 18888888888
    executors:
      - threadPoolName: austin.im.notice
        corePoolSize: 6
        maximumPoolSize: 8
        queueCapacity: 200
        queueType: VariableLinkedBlockingQueue   # 任务队列，查看源码QueueTypeEnum枚举类
        rejectedHandlerType: CallerRunsPolicy    # 拒绝策略，查看RejectedTypeEnum枚举类
        keepAliveTime: 50
        allowCoreThreadTimeOut: false
        threadNamePrefix: austin-           # 线程名前缀
      - threadPoolName: execute-xxl-thread-pool
        corePoolSize: 3
        maximumPoolSize: 3
        queueCapacity: 200
        queueType: VariableLinkedBlockingQueue   # 任务队列，查看源码QueueTypeEnum枚举类
        rejectedHandlerType: CallerRunsPolicy    # 拒绝策略，查看RejectedTypeEnum枚举类
        keepAliveTime: 50
        allowCoreThreadTimeOut: false
        threadNamePrefix: austin-           # 线程名前缀
        notifyItems: # 报警项，不配置自动会配置（变更通知、容量报警、活性报警、拒绝报警）
          - type: capacity               # 报警项类型，查看源码 NotifyTypeEnum枚举类
            enabled: true
            threshold: 80                # 报警阈值
            platform-ids: [ ding,wechat ]     # 可选配置，不配置默认拿上层platforms配置的所以平台
            silence-period: 120                # 报警间隔（单位：s）
          - type: change
            enabled: true
          - type: liveness
            enabled: true
            threshold: 80
          - type: reject
            enabled: true
            threshold: 1

mhd:
  upload:
    crowd:
      path: /Users/3y/temp
  mq:
    # 消息队列类型：
    pipeline: rocketMq
    payload:
      # RocketMQ 默认消息体约 4MB，这里预留头部开销，默认限制 3MB
      max-size-bytes: 3145728
    retry:
      send:
        max-attempts: 3
        backoff-ms: 200
      consume:
        max-reconsume-times: 3
    dlq:
      record-ttl-hours: 168
      callback:
        enabled: false
    topic:
      send: austinBusiness
      send-orderly: austinBusinessOrderly
      recall: austinRecall
      log: austinTraceLog
    tagId:
      value: mhd
    rocketmq:
      orderly:
        enabled: false
        # 仅命中的业务方走有序topic（逗号分隔）
        business-owners: order-center
      consumer:
        group:
          send: unique-biz-consumer-group
          send-orderly: unique-biz-orderly-consumer-group
          recall: unique-recall-consumer-group
  idempotency:
    enabled: true
    lock-ttl-seconds: 10
    result-ttl-seconds: 300
  nacos:
    # 是否开启拉取nacos配置
    enable: false
  senswords:
    # 是否开启敏感词过滤
    filter:
      enabled: true
    # 敏感词字典路径
    dict:
      path: classpath:sensitive-words.txt
